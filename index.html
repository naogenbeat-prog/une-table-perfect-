<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNE TABLE | オーダーメイド・ケータリング</title>
    <!-- 必要なライブラリを直接読み込み（ビルドエラーを回避） -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;1,400&family=Noto+Serif+JP:wght@200;300;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'EB Garamond', 'Noto Serif JP', serif; background: #0a0a0a; color: #f8f5f0; }
        .font-serif-jp { font-family: 'Noto Serif JP', serif; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.5s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // アイコンコンポーネント（SVGで直接記述してエラーを防止）
        const ChevronLeft = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>;
        const ChevronRight = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>;
        const Mail = () => <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/><rect width="20" height="16" x="2" y="4" rx="2"/></svg>;
        const Instagram = () => <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>;

        const images = {
            concept1: "/business-16.png",
            serviceWedding: "/cocktail-3.png",
            serviceCorporate: "/cocktail-7.png",
            servicePrivate: "/private-4.jpg",
            gallery: ["/business-4.jpg", "/business-1.jpeg", "/roastbeef.jpeg", "/cocktail-3.png", "/business-9.jpeg", "/private-5.jpeg"]
        };

        const galleryData = {
            cocktail: { title: "Cocktail Party", desc: "カジュアルな会合を盛り上げる、彩り豊かな演出。フィンガーフードで会話も弾む特別な空間を演出します。", photos: ["/cocktail-2.png", "/cocktail-3.png", "/business-16.png", "/cocktail-14.jpg", "/business-14.jpg", "/business-13.png"] },
            standing: { title: "Standing Reception", desc: "大切なビジネスシーンに適した効率的ディスプレイ。ブランドイメージを高める洗練された立食スタイルを提供します。", photos: ["/cocktail-7.png", "/business-12.jpg", "/business-4.jpg", "/business-1.jpeg", "/business-11.jpeg", "/business-9.jpeg"] },
            private: { title: "Private Dining", desc: "オーダーメイドのレストラン。すべてにこだわった特別な空間で、プライベートな贅沢をお楽しみください。", photos: ["/private-4.jpg", "/private-5.jpeg", "/private-3.jpg", "/private-2.jpg", "/private-1.png", "/IMG_3120.JPG"] }
        };

        function App() {
            const [view, setView] = useState("home");
            const [scrolled, setScrolled] = useState(false);
            const [plan, setPlan] = useState("");

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener("scroll", handleScroll);
                const handlePopState = () => setView("home");
                window.addEventListener("popstate", handlePopState);
                return () => {
                    window.removeEventListener("scroll", handleScroll);
                    window.removeEventListener("popstate", handlePopState);
                };
            }, []);

            const changeView = (v) => {
                if (v !== "home") window.history.pushState({}, "", "");
                setView(v);
                window.scrollTo(0, 0);
            };

            const selectPlan = (p) => {
                setPlan(p);
                document.getElementById("contact")?.scrollIntoView({ behavior: 'smooth' });
            };

            if (view !== "home") {
                const data = galleryData[view];
                return (
                    <div className="min-h-screen bg-[#0a0a0a] p-8 md:p-16 animate-fadeIn">
                        <button onClick={() => window.history.back()} className="text-amber-500 mb-12 flex items-center gap-2 uppercase tracking-widest text-xs">
                            <ChevronLeft /> Back
                        </button>
                        <div className="max-w-7xl mx-auto text-center">
                            <h2 className="text-4xl text-amber-500 mb-6 italic">{data.title}</h2>
                            <p className="text-stone-400 mb-16 max-w-2xl mx-auto leading-loose">{data.desc}</p>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                {data.photos.map((img, i) => <img key={i} src={img} className="w-full h-80 object-cover shadow-2xl" />)}
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen">
                    <nav className={`fixed w-full z-50 transition-all duration-700 ${scrolled ? "bg-[#0a0a0a]/95 py-4 border-b border-zinc-800" : "bg-transparent py-8"}`}>
                        <div className="max-w-7xl mx-auto px-12 flex justify-between items-center">
                            <div className="text-2xl tracking-[0.4em] uppercase font-light">UNE TABLE</div>
                            <div className="flex gap-10 text-[10px] tracking-[0.2em] uppercase text-stone-400 items-center">
                                <a href="#concept" className="hover:text-amber-500">Concept</a>
                                <a href="#services" className="hover:text-amber-500">Services</a>
                                <a href="#contact" className="text-amber-500 font-bold">Reservation</a>
                            </div>
                        </div>
                    </nav>

                    <section className="h-screen flex flex-col items-center justify-center text-center relative overflow-hidden">
                        <img src="/hero-bg.jpg" className="absolute inset-0 w-full h-full object-cover opacity-40 scale-105" />
                        <div className="relative z-10">
                            <h1 className="text-4xl md:text-7xl font-light mb-12 leading-tight">華やかな装いを<br />あなただけの空間へ。</h1>
                            <p className="text-stone-300 font-light text-xl max-w-2xl mx-auto leading-loose">厳選された旬の食材を使用し、目にも楽しい彩りを添えて。<br />特別な日を彩る最高峰のケータリングをお届け致します。</p>
                        </div>
                    </section>

                    <section id="concept" className="py-32 px-12 max-w-7xl mx-auto flex flex-col md:flex-row items-center gap-20">
                        <img src={images.concept1} className="w-full md:w-1/2 h-[600px] object-cover shadow-2xl" />
                        <div className="w-full md:w-1/2">
                            <h3 className="text-amber-500 tracking-[0.3em] text-xs uppercase mb-8 italic">CONCEPT</h3>
                            <h2 className="text-4xl md:text-5xl mb-10 font-light leading-snug">感動の一瞬を<br />永遠の思い出に</h2>
                            <p className="mb-8 font-light text-lg leading-loose">私たちは、厳選された食材を確かな技術で、目にも美しい一皿へと昇華させます。</p>
                            <p className="leading-loose font-light text-lg text-stone-400">UNE TABLE（ユヌ・ターブル）は、フランス語で「一つのテーブル」を意味します。大切なビジネスシーンから、究極のおもてなしをお約束いたします。</p>
                        </div>
                    </section>

                    <section id="services" className="py-24 bg-zinc-900 px-12">
                        <div className="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-12">
                            {[
                                { id: "cocktail", title: "Cocktail Party", img: images.serviceWedding, desc: "カジュアルな会合を盛り上げる、", hi: "彩り豊かな演出" },
                                { id: "standing", title: "Standing Reception", img: images.serviceCorporate, desc: "大切なビジネスシーンに適した", hi: "効率的ディスプレイ" },
                                { id: "private", title: "Private Dining", img: images.servicePrivate, desc: "オーダーメイドのレストラン", hi: "贅沢な特別な空間" },
                            ].map(s => (
                                <div key={s.id} onClick={() => changeView(s.id)} className="group cursor-pointer">
                                    <div className="aspect-[3/4] overflow-hidden mb-8 shadow-2xl"><img src={s.img} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" /></div>
                                    <div className="flex gap-4">
                                        <div className="w-[2px] h-12 bg-amber-500 mt-1"></div>
                                        <div>
                                            <h4 className="text-2xl mb-4 font-light uppercase tracking-widest">{s.title}</h4>
                                            <p className="text-stone-300 text-lg leading-relaxed">{s.desc}<br/><span className="text-amber-500 font-bold">{s.hi}</span></p>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </section>

                    <section id="menu" className="py-32 text-center">
                        <h2 className="text-4xl mb-20 font-light italic">Standard Plan</h2>
                        <div className="max-w-7xl mx-auto px-12 grid grid-cols-1 md:grid-cols-3 gap-8">
                            {["立食スタイル", "立食・着席", "着席フルコース"].map(p => (
                                <div key={p} className="p-12 border border-zinc-800 bg-zinc-900/30 hover:border-amber-500/50 transition-all shadow-xl">
                                    <h3 className="text-2xl mb-8 font-light">{p}</h3>
                                    <button onClick={() => selectPlan(p)} className="w-full py-4 border border-zinc-700 text-[10px] tracking-[0.3em] uppercase hover:bg-white hover:text-black transition-all">Select Plan</button>
                                </div>
                            ))}
                        </div>
                    </section>

                    <section id="gallery" className="py-32 bg-zinc-950 px-12 text-center">
                        <h3 className="text-amber-500 text-xs tracking-widest uppercase mb-4">Gallery</h3>
                        <h2 className="text-4xl mb-20 font-light tracking-wide">「テーブル」の記録</h2>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                            {images.gallery.map((img, i) => <img key={i} src={img} className="w-full aspect-square object-cover shadow-2xl opacity-80 hover:opacity-100 transition-all" />)}
                        </div>
                    </section>

                    <section id="contact" className="py-32 bg-black px-12">
                        <div className="max-w-4xl mx-auto bg-zinc-900/50 p-12 border border-zinc-800 shadow-2xl">
                            <h2 className="text-4xl text-center mb-16 font-light">Reservation</h2>
                            <form className="space-y-10">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                                    <input placeholder="お名前" className="bg-transparent border-b border-zinc-700 py-3 outline-none focus:border-amber-500" />
                                    <input placeholder="メールアドレス" className="bg-transparent border-b border-zinc-700 py-3 outline-none focus:border-amber-500" />
                                </div>
                                <select value={plan} onChange={(e) => setPlan(e.target.value)} className="w-full bg-zinc-800 border-b border-zinc-700 py-4 px-4 outline-none">
                                    <option value="">プランを選択してください</option>
                                    <option value="立食スタイル">立食スタイル</option>
                                    <option value="立食・着席">立食・着席</option>
                                    <option value="着席フルコース">着席フルコース</option>
                                </select>
                                <textarea placeholder="ご要望" className="w-full bg-transparent border-b border-zinc-700 h-32 outline-none focus:border-amber-500 resize-none" />
                                <button className="w-full py-5 bg-amber-600 hover:bg-amber-500 text-white font-bold tracking-[0.4em] transition-all">SEND MESSAGE</button>
                            </form>
                        </div>
                    </section>

                    <footer className="py-20 text-center border-t border-zinc-900">
                        <div className="text-2xl tracking-[0.5em] mb-12 text-stone-500">UNE TABLE</div>
                        <div className="flex justify-center gap-12 mb-12 text-stone-600">
                            <Mail /> <Instagram />
                        </div>
                        <p className="text-[10px] text-stone-800 uppercase tracking-widest">© 2024 UNE TABLE. All Rights Reserved.</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
